name: PixelOS Mondrian Local Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -a -f || true
          sudo apt clean || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
          schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Set Build Environment
        run: |
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          echo "NINJA_ARGS=-j$(nproc --all)" >> $GITHUB_ENV
          echo "SOONG_JAVA_HEAP_SIZE=4096" >> $GITHUB_ENV
          echo "WITH_DEXPREOPT_DEBUG_INFO=false" >> $GITHUB_ENV
          ccache -M 5G || true

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload ROM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian
          path: out/target/product/mondrian/*.zip
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile || true
          rm -rf out || true
          rm -rf .repo || true
          rm -rf $HOME/.ccache || true
          sudo apt clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          df -h
