name: PixelOS Mondrian Crave Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          curl -sL -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          sudo mv crave /usr/local/bin/crave

      - name: Configure Crave
        run: |
          mkdir -p ${HOME}/.config/crave
          cat << 'EOF' > ${HOME}/.config/crave/crave.conf
          ${{ secrets.CRAVE_CONF }}
          EOF
          chmod 600 ${HOME}/.config/crave/crave.conf

      - name: Run Build inside Crave Cloud
        run: |
          # Создаем файл настроек crave.yaml, чтобы напрямую сказать серверу наш Project ID (82 = PixelOS)
          # Это поможет обойти зависший API-запрос поиска проекта
          cat << 'EOF' > crave.yaml
          Version: 1
          DefaultProjectID: 82
          EOF
          
          # Запускаем сборку (убрали обманку с git remote, так как теперь есть crave.yaml)
          /usr/local/bin/crave -k -c ${HOME}/.config/crave/crave.conf -v run --no-patch -- bash build.sh

      - name: Upload ROM Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian-ROM
          path: ./*.zip
          if-no-files-found: ignore
