name: PixelOS Mondrian Android 16 - Crave Build

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build? (true/false)'
        required: false
        default: 'true'
      lunch_target:
        description: 'Lunch target'
        required: true
        default: 'pixelos_mondrian-userdebug'
      make_command:
        description: 'Make command'
        required: false
        default: 'export ALLOW_MISSING_DEPENDENCIES=true && mka bacon -j$(nproc --all)'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Crave (manual fixed)
        run: |
          curl -L -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          sudo mv crave /usr/local/bin/crave || mv crave /usr/local/bin/crave
          echo "/usr/local/bin" >> $GITHUB_PATH
          crave --version

      - name: Configure Crave
        env:
          CRAVE_CONF: ${{ secrets.CRAVE_CONF }}
        run: |
          mkdir -p \~/.crave/config
          echo "$CRAVE_CONF" > \~/.crave/config/crave.conf
          crave whoami

      - name: Run Build on Crave
        run: |
          git remote set-url origin https://android.googlesource.com/platform/manifest
          crave run \
            --force \
            --no-patch \
            ${{ github.event.inputs.clean_build == 'true' && '--clean' || '' }} \
            -- bash -c "
              rm -rf .repo && \
              repo init -u https://github.com/PixelOS-AOSP/android_manifest.git -b sixteen-qpr2 --git-lfs && \
              rm -rf .repo/local_manifests && \
              mkdir -p .repo/local_manifests && \
              curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/.github/workflows/mondrian.xml -o .repo/local_manifests/mondrian.xml && \
              repo sync -c -j\$(nproc --all) --force-sync --no-tags --no-clone-bundle && \
              source build/envsetup.sh && \
              breakfast mondrian || true && \
              cp -f device/xiaomi/mondrian/lineage_mondrian.mk device/xiaomi/mondrian/pixelos_mondrian.mk || true && \
              lunch ${{ github.event.inputs.lunch_target }} || echo 'LUNCH FAILED' && \
              ${{ github.event.inputs.make_command }} || echo 'MAKE FAILED' && \
              find out/target/product -name '*.zip' -exec echo 'Found ZIP:' {} \; || echo 'No ZIP found!'
            "

      - name: Pull Artifact (zip)
        if: always()
        run: |
          git remote set-url origin https://android.googlesource.com/platform/manifest
          crave pull out/target/product/mondrian/*.zip || \
          crave pull out/target/product/mondrian/*mondrian*.zip || \
          ls -la out/target/product/mondrian/ || echo "No out dir"

      - name: Upload Artifact to GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixelos-mondrian-build
          path: out/target/product/mondrian/*.zip
          if-no-files-found: warn
          retention-days: 7
