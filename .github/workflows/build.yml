name: PixelOS Mondrian Build

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * 0'  # Еженедельно в воскресенье (раскомментируйте если нужно)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl git python3

      - name: Install repo
        run: |
          mkdir -p $HOME/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > $HOME/bin/repo
          chmod +x $HOME/bin/repo

      - name: Install crave
        run: |
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          if [ -f crave ]; then mv crave $HOME/bin/crave && chmod +x $HOME/bin/crave; fi
          if [ -f bin/crave ]; then mv bin/crave $HOME/bin/crave && chmod +x $HOME/bin/crave; fi

      - name: Add tools to PATH
        run: echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Crave
        run: |
          export PATH="$HOME/bin:$PATH"
          mkdir -p $HOME/.crave
          cat << EOF > $HOME/.crave/crave.conf
          [crave]
          username: ${{ secrets.CRAVE_USERNAME }}
          token: ${{ secrets.CRAVE_TOKEN }}
          EOF
          
          # Проверяем конфигурацию
          echo "🔍 Crave config:"
          cat $HOME/.crave/crave.conf | grep -v token

      - name: Debug Crave Setup
        run: |
          export PATH="$HOME/bin:$PATH"
          echo "🔍 Checking crave installation:"
          which crave || echo "❌ crave not found in PATH"
          echo "🔍 PATH: $PATH"
          echo "🔍 Crave version:"
          crave version || echo "❌ Cannot get crave version"
          echo "🔍 Crave auth status:"
          crave auth status || echo "❌ Auth failed - check username and token"

      - name: Setup project and sync
        run: |
          export PATH="$HOME/bin:$PATH"
          
          # Создаем уникальное имя клона с датой и временем
          CLONE_NAME="pixelos_mondrian_$(date +%Y%m%d_%H%M%S)"
          echo "📦 Using clone name: $CLONE_NAME"
          
          # Проверяем доступные клоны
          echo "📋 Existing clones before creation:"
          crave clone list || echo "No clones or failed to list"
          
          # Пытаемся создать новый клон
          echo "🔄 Creating new clone..."
          if crave clone create "$CLONE_NAME"; then
            echo "✅ Clone created successfully"
          else
            echo "❌ Failed to create clone. Checking alternatives..."
            
            # Пробуем создать с другим именем (более простым)
            SIMPLE_NAME="pixelos_build"
            echo "🔄 Trying simple name: $SIMPLE_NAME"
            
            # Удаляем если существует
            crave clone delete "$SIMPLE_NAME" || true
            
            if crave clone create "$SIMPLE_NAME"; then
              echo "✅ Clone created with simple name"
              CLONE_NAME="$SIMPLE_NAME"
            else
              echo "❌ Cannot create clone. Checking disk space..."
              crave run --no-patch -- "df -h" || echo "Cannot check disk space"
              exit 1
            fi
          fi
          
          # Получаем директорию клона
          CLONE_DIR=$(crave clone dir "$CLONE_NAME" 2>&1) || {
            echo "❌ Cannot get clone directory"
            exit 1
          }
          
          cd "$CLONE_DIR"
          echo "📍 Working directory: $(pwd)"
          echo "📁 Directory contents:"
          ls -la
          
          # Инициализируем repo если ещё не инициализировано
          if [ ! -d .repo ]; then
            echo "📥 Initializing repo..."
            repo init -u https://github.com/LF52406/android_manifest.git -b sixteen-qpr2 --git-lfs
          else
            echo "✅ Repo already initialized"
          fi
          
          # Обновляем локальные манифесты
          echo "📝 Updating local manifests..."
          rm -rf .repo/local_manifests
          mkdir -p .repo/local_manifests
          
          cat << 'EOF' > .repo/local_manifests/mondrian.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
              <project path="device/xiaomi/mondrian" name="LF52406/android_device_xiaomi_mondrian" remote="github" revision="lineage-23.2" />
              <project path="device/xiaomi/sm8450-common" name="LF52406/android_device_xiaomi_sm8450-common" remote="github" revision="lineage-23.2" />
              <project path="vendor/xiaomi/mondrian" name="LF52406/proprietary_vendor_xiaomi_mondrian" remote="github" revision="lineage-23.2" />
              <project path="vendor/xiaomi/sm8450-common" name="LF52406/proprietary_vendor_xiaomi_sm8450-common" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450" name="LF52406/android_kernel_xiaomi_sm8450" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450-modules" name="LineageOS/android_kernel_xiaomi_sm8450-modules" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450-devicetrees" name="LineageOS/android_kernel_xiaomi_sm8450-devicetrees" remote="github" revision="lineage-23.2" />
              <project path="hardware/xiaomi" name="LineageOS/android_hardware_xiaomi" remote="github" revision="lineage-23.2" />
          </manifest>
          EOF
          
          echo "📄 Local manifest created"
          
          # Синхронизация с видимым прогрессом
          echo "🔄 Starting repo sync (this may take 20-40 minutes)..."
          echo "⏱️  Started at: $(date)"
          
          # Запускаем sync с выводом прогресса
          repo sync -c -j8 --force-sync --no-tags --no-clone-bundle --fail-fast 2>&1 | while IFS= read -r line; do
            echo "$line"
            # Показываем прогресс для длительных операций
            if [[ "$line" == *"Fetching"* ]] || [[ "$line" == *"Checking out"* ]] || [[ "$line" == *"Syncing work tree"* ]]; then
              echo "⏳ Still syncing... $(date +%H:%M:%S)"
            fi
          done
          
          # Проверяем успешность синхронизации
          SYNC_RESULT=${PIPESTATUS[0]}
          if [ $SYNC_RESULT -eq 0 ]; then
            echo "✅ Sync completed successfully at $(date)"
          else
            echo "❌ Sync failed with code $SYNC_RESULT"
            exit $SYNC_RESULT
          fi
          
          # Показываем статистику
          echo "📊 Disk usage:"
          du -sh .repo/projects 2>/dev/null || echo "No projects yet"
          echo "📁 Total projects:"
          repo list | wc -l

      - name: Run build
        run: |
          export PATH="$HOME/bin:$PATH"
          # Находим последний созданный клон
          CLONE_NAME=$(crave clone list | grep "pixelos" | tail -1 | awk '{print $1}')
          if [ -z "$CLONE_NAME" ]; then
            echo "❌ No pixelos clone found"
            exit 1
          fi
          
          cd "$(crave clone dir "$CLONE_NAME")"
          
          echo "🏗️  Starting build at $(date)"
          echo "⚙️  Build configuration: pixelos_mondrian-userdebug"
          
          # Запускаем сборку
          crave run --clean --no-patch -- "source build/envsetup.sh && lunch pixelos_mondrian-userdebug && mka bacon -j\$(nproc --all)"
          
          echo "✅ Build finished at $(date)"

      - name: Download result
        if: always()
        run: |
          export PATH="$HOME/bin:$PATH"
          # Находим последний созданный клон
          CLONE_NAME=$(crave clone list | grep "pixelos" | tail -1 | awk '{print $1}')
          if [ -z "$CLONE_NAME" ]; then
            echo "❌ No pixelos clone found"
            exit 1
          fi
          
          cd "$(crave clone dir "$CLONE_NAME")"
          
          echo "📥 Checking for build artifacts..."
          
          # Создаем директорию для загрузки
          mkdir -p $HOME/artifacts
          cd $HOME/artifacts
          
          # Проверяем наличие zip файлов
          if crave ls "$CLONE_NAME:out/target/product/mondrian/*.zip" 2>/dev/null | grep -q ".zip"; then
            echo "✅ Found zip files, downloading..."
            crave pull --clone "$CLONE_NAME" out/target/product/mondrian/*.zip ./
          else
            echo "⚠️ No zip files found in out/target/product/mondrian/"
            # Показываем содержимое директории для диагностики
            echo "📁 Contents of out/target/product/mondrian/:"
            crave ls "$CLONE_NAME:out/target/product/mondrian/" || echo "Directory not found"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian-${{ github.run_number }}
          path: |
            $HOME/artifacts/*.zip
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          export PATH="$HOME/bin:$PATH"
          echo "🧹 Cleaning up old clones..."
          
          # Удаляем клоны старше 3 дней
          crave clone list | grep "pixelos" | while read -r line; do
            CLONE_NAME=$(echo "$line" | awk '{print $1}')
            CLONE_DATE=$(echo "$line" | awk '{print $2}')
            echo "Found clone: $CLONE_NAME from $CLONE_DATE"
            
            # Здесь можно добавить логику удаления старых клонов
            # crave clone delete "$CLONE_NAME" || true
          done
          
          echo "✅ Cleanup completed"
