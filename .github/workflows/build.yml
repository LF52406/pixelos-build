name: Build PixelOS Android 16 (mondrian)

on:
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Очистка диска перед началом
        run: |
          sudo rm -rf /home/lf5/actions-runner/_work/pixelos-build/pixelos-build/*
          
      - name: Установка необходимых инструментов
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3

      - name: Настройка Git
        run: |
          git config --global user.email "your-email@example.com"
          git config --global user.name "LF5"

      - name: Установка репозитория (repo)
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

      - name: Синхронизация исходников PixelOS (Android 16)
        run: |
          export PATH=~/bin:$PATH
          mkdir -p android && cd android
          repo init -u https://github.com/PixelOS-AOSP/manifest.git -b sixteen --git-lfs
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Подготовка дерева устройства (mondrian)
        run: |
          export PATH=~/bin:$PATH
          cd android
          git clone https://github.com/PixelOS-Devices/device_xiaomi_mondrian.git -b sixteen device/xiaomi/mondrian
          # Здесь скрипт сам подтянет зависимости (vendor, kernel) через lunch
          
      - name: Запуск компиляции
        run: |
          export PATH=~/bin:$PATH
          cd android
          source build/envsetup.sh
          lunch pixelos_mondrian-userdebug
          mka bacon -j$(nproc --all)
