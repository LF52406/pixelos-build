name: PixelOS Mondrian Crave Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/crave

      - name: Configure Crave
        run: |
          mkdir -p ${HOME}/.config/crave
          echo "${{ secrets.CRAVE_CONF }}" > ${HOME}/.config/crave/crave.conf

      - name: Run Crave
        run: |
          rm -rf .git
          crave run --projectID 82 --no-patch -- "bash build.sh"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian
          path: ./*.zip
