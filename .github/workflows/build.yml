name: PixelOS Mondrian Crave Hack

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          curl -sL -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          sudo mv crave /usr/local/bin/crave
          /usr/local/bin/crave --version || true

      - name: Configure Crave
        env:
          # Используем сырой и правильный JSON-формат
          CRAVE_CONF: ${{ secrets.CRAVE_CONF }}
        run: |
          mkdir -p ${HOME}/.config/crave
          echo "$CRAVE_CONF" > ${HOME}/.config/crave/crave.conf
          /usr/local/bin/crave whoami

      - name: Run Build inside Crave Cloud
        run: |
          # ОБМАНКА: Подменяем проект на свободный crave-workspaces
          git remote set-url origin https://github.com/accupara/crave-workspaces.git
          
          # Запускаем скрипт в облаке Crave
          /usr/local/bin/crave -k -c ${HOME}/.config/crave/crave.conf -v run --no-patch -- bash build.sh

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian
          path: ./*.zip
          if-no-files-found: ignore
