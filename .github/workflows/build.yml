name: PixelOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Crave
        run: |
          curl -L -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          sudo mv crave /usr/local/bin/crave
          echo "/usr/local/bin" >> $GITHUB_PATH
          crave --version

      - name: Configure Crave
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          mkdir -p ${HOME}/.config/crave
          cat << EOF > ${HOME}/.config/crave/crave.conf
          [crave]
          username = $CRAVE_USERNAME
          token = $CRAVE_TOKEN
          EOF
          chmod 600 ${HOME}/.config/crave/crave.conf
          crave whoami

      - name: Run Build inside Crave Cloud
        run: |
          # ОБМАНКА: Подменяем проект на свободный crave-workspaces, чтобы нас пустили на сервера
          git remote set-url origin https://github.com/accupara/crave-workspaces.git
          
          # Запускаем скрипт
          crave -k -c ${HOME}/.config/crave/crave.conf -v run --no-patch -- bash build.sh

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian
          path: ./*.zip
          if-no-files-found: ignore
