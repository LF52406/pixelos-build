name: Build AOSPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Set up environment
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3
          git lfs install
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.name "LF5"
          git config --global user.email "lf524prod24061993@gmail.com"

      - name: Sync and Build
        run: |
          export PATH=~/bin:$PATH
          mkdir -p ~/aospa
          cd ~/aospa
          repo init -u https://github.com/AOSPA/manifest -b baklava --depth=1
          
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/mondrian.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
              <project name="LF52406/android_device_xiaomi_mondrian" path="device/xiaomi/mondrian" remote="github" />
              <project name="LF52406/android_device_xiaomi_sm8450-common" path="device/xiaomi/sm8450-common" remote="github" />
              <project name="LF52406/proprietary_vendor_xiaomi_mondrian" path="vendor/xiaomi/mondrian" remote="github" />
              <project name="LF52406/proprietary_vendor_xiaomi_sm8450-common" path="vendor/xiaomi/sm8450-common" remote="github" />
              <project name="LF52406/android_kernel_xiaomi_sm8450" path="kernel/xiaomi/sm8450" remote="github" />
              <project name="raul-16/android_kernel_xiaomi_sm8450-modules" path="kernel/xiaomi/sm8450-modules" remote="github" revision="lineage-23.2" />
              <project name="LineageOS/android_hardware_xiaomi" path="hardware/xiaomi" remote="github" revision="lineage-23.2" />
          </manifest>
          EOF
          
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags
          
          . build/envsetup.sh
          lunch aospa_mondrian-userdebug
          mka bacon
