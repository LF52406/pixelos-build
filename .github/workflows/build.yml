name: PixelOS Mondrian Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Crave
        env:
          CRAVE_CONF: ${{ secrets.CRAVE_CONF }}
        run: |
          mkdir -p ${HOME}/.config/crave
          echo "$CRAVE_CONF" > ${HOME}/.config/crave/crave.conf

      - name: Run Build on Crave
        run: |
          curl -L -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          ./crave -k -c ${HOME}/.config/crave/crave.conf -v run --no-patch -- bash build.sh

      - name: Pull Build Artifacts
        if: always()
        run: |
          curl -L -o crave https://github.com/accupara/crave/releases/download/0.2-7193/crave-0.2-7193-linux-amd64.bin
          chmod +x crave
          ./crave -k -c ${HOME}/.config/crave/crave.conf pull out/target/product/mondrian/*.zip || echo "No zip found"
