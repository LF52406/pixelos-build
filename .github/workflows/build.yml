name: Build PixelOS Android 16 (mondrian)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Очистка рабочего пространства
        run: |
          sudo rm -rf ${{ github.workspace }}/*
          df -h /

      - name: Установка зависимостей
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-minimal

      - name: Настройка Git
        run: |
          git config --global user.email "your-email@example.com"
          git config --global user.name "LF5"
          git lfs install

      - name: Установка Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Синхронизация PixelOS
        run: |
          export PATH=~/bin:$PATH
          mkdir -p ~/android && cd ~/android
          repo init -u https://github.com/PixelOS-AOSP/android_manifest.git -b sixteen-qpr2 --git-lfs --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Клонирование исходников устройства
        run: |
          cd ~/android
          git clone https://github.com/LineageOS/android_device_xiaomi_mondrian.git -b lineage-23.2 device/xiaomi/mondrian
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git -b lineage-23.2 kernel/xiaomi/sm8450
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450-modules.git -b lineage-23.2 kernel/xiaomi/sm8450-modules
          git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_mondrian.git -b lineage-23.2 vendor/xiaomi/mondrian
          git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sm8450-common.git -b lineage-23.2 vendor/xiaomi/sm8450-common
          git clone https://github.com/LineageOS/android_hardware_xiaomi.git -b lineage-23.2 hardware/xiaomi

      - name: Адаптация дерева под PixelOS
        run: |
          cd ~/android/device/xiaomi/mondrian
          mv lineage_mondrian.mk pixelos_mondrian.mk || true
          sed -i 's/lineage/pixelos/g' pixelos_mondrian.mk || true
          sed -i 's/lineage/pixelos/g' AndroidProducts.mk || true

      - name: Настройка Ccache
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 50G
          ccache -o compression=true

      - name: Запуск компиляции
        run: |
          export PATH=~/bin:$PATH
          export CCACHE_DIR=~/.ccache
          export USE_CCACHE=1
          cd ~/android
          source build/envsetup.sh
          lunch pixelos_mondrian-userdebug
          mka bacon -j$(nproc --all)

      - name: Проверка результата
        run: |
          ls -lh ~/android/out/target/product/mondrian/*.zip || echo "Failed"
