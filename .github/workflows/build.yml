name: PixelOS Mondrian Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl git python3 wget

      - name: Install repo
        run: |
          mkdir -p $HOME/bin
          curl -s -o $HOME/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod +x $HOME/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Install crave binary with retries
        run: |
          mkdir -p $HOME/bin
          rm -f $HOME/bin/crave
          
          echo "📥 Downloading crave binary with retries..."
          
          # Пробуем несколько раз с разными методами
          for i in {1..3}; do
            echo "Attempt $i..."
            
            # Метод 1: wget с таймаутом и retry
            if wget --timeout=30 --tries=3 --retry-connrefused -q --show-progress -O $HOME/bin/crave https://github.com/accupara/crave/releases/download/v0.4.0/crave-linux-amd64; then
              echo "✅ Download successful with wget"
              break
            fi
            
            # Метод 2: curl если wget не сработал
            if curl -L --connect-timeout 30 --retry 3 -o $HOME/bin/crave https://github.com/accupara/crave/releases/download/v0.4.0/crave-linux-amd64; then
              echo "✅ Download successful with curl"
              break
            fi
            
            if [ $i -eq 3 ]; then
              echo "❌ All download attempts failed"
              exit 1
            fi
            
            sleep 5
          done
          
          # Проверяем размер файла
          if [ -f $HOME/bin/crave ]; then
            FILE_SIZE=$(wc -c < $HOME/bin/crave)
            echo "📊 File size: $FILE_SIZE bytes"
            
            if [ $FILE_SIZE -lt 1000000 ]; then
              echo "❌ File too small ($FILE_SIZE bytes), download failed"
              rm -f $HOME/bin/crave
              exit 1
            fi
            
            # Устанавливаем права
            chmod 755 $HOME/bin/crave
            
            # Проверяем что это ELF бинарник
            if file $HOME/bin/crave | grep -q "ELF"; then
              echo "✅ Valid ELF binary detected"
            else
              echo "❌ Not a valid ELF binary"
              rm -f $HOME/bin/crave
              exit 1
            fi
          else
            echo "❌ File not found after download"
            exit 1
          fi
          
          # Добавляем в PATH
          export PATH="$HOME/bin:$PATH"
          echo "$HOME/bin" >> $GITHUB_PATH
          
          # Проверяем работу
          echo "✅ Testing crave:"
          $HOME/bin/crave version || echo "⚠️ Version check failed but continuing"

      - name: Verify crave installation
        run: |
          if [ ! -f $HOME/bin/crave ]; then
            echo "❌ Crave binary missing"
            exit 1
          fi
          
          if [ ! -x $HOME/bin/crave ]; then
            echo "❌ Crave binary not executable, fixing..."
            chmod 755 $HOME/bin/crave
          fi
          
          echo "✅ Crave binary OK:"
          ls -la $HOME/bin/crave
          file $HOME/bin/crave
          
          # Добавляем в PATH
          export PATH="$HOME/bin:$PATH"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Crave
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          export PATH="$HOME/bin:$PATH"
          
          # Проверяем что crave доступен
          if ! command -v crave &> /dev/null; then
            echo "❌ crave command not found in PATH"
            echo "PATH: $PATH"
            ls -la $HOME/bin/ || true
            exit 1
          fi
          
          mkdir -p $HOME/.crave
          
          # Проверяем секреты
          if [ -z "$CRAVE_USERNAME" ]; then
            echo "❌ CRAVE_USERNAME is empty"
            exit 1
          fi
          
          if [ -z "$CRAVE_TOKEN" ]; then
            echo "❌ CRAVE_TOKEN is empty"
            exit 1
          fi
          
          echo "✅ Username: $CRAVE_USERNAME"
          echo "✅ Token length: ${#CRAVE_TOKEN} characters"
          
          # Создаем конфиг
          cat << EOF > $HOME/.crave/crave.conf
          [crave]
          username = $CRAVE_USERNAME
          token = $CRAVE_TOKEN
          EOF
          
          chmod 600 $HOME/.crave/crave.conf
          echo "✅ Crave config created"
          
          # Тестируем аутентификацию
          echo "🔍 Testing authentication..."
          if crave clone list > /dev/null 2>&1; then
            echo "✅ Authentication successful!"
            crave clone list
          else
            echo "❌ Authentication failed"
            echo "Debug: Trying with explicit config..."
            crave --config $HOME/.crave/crave.conf clone list || true
            exit 1
          fi

      - name: Setup project and sync
        run: |
          export PATH="$HOME/bin:$PATH"
          
          # Проверяем что crave работает
          if ! command -v crave &> /dev/null; then
            echo "❌ crave command not found"
            exit 1
          fi
          
          # Удаляем старые клоны если есть
          echo "🧹 Cleaning old clones..."
          crave clone list | grep "pixelos" | while read -r line; do
            OLD_CLONE=$(echo "$line" | awk '{print $1}')
            echo "Removing old clone: $OLD_CLONE"
            crave clone delete "$OLD_CLONE" || true
          done
          
          # Создаем новый клон
          CLONE_NAME="pixelos_mondrian_$(date +%Y%m%d_%H%M%S)"
          echo "📦 Creating new clone: $CLONE_NAME"
          
          if crave clone create "$CLONE_NAME"; then
            echo "✅ Clone created successfully"
          else
            echo "❌ Failed to create clone"
            exit 1
          fi
          
          # Переходим в директорию клона
          cd "$(crave clone dir "$CLONE_NAME")"
          echo "📍 Working directory: $(pwd)"
          
          # Инициализируем repo
          echo "📥 Initializing repo..."
          repo init -u https://github.com/LF52406/android_manifest.git -b sixteen-qpr2 --git-lfs
          
          # Создаем локальные манифесты
          echo "📝 Creating local manifests..."
          rm -rf .repo/local_manifests
          mkdir -p .repo/local_manifests
          
          cat << 'EOF' > .repo/local_manifests/mondrian.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
              <project path="device/xiaomi/mondrian" name="LF52406/android_device_xiaomi_mondrian" remote="github" revision="lineage-23.2" />
              <project path="device/xiaomi/sm8450-common" name="LF52406/android_device_xiaomi_sm8450-common" remote="github" revision="lineage-23.2" />
              <project path="vendor/xiaomi/mondrian" name="LF52406/proprietary_vendor_xiaomi_mondrian" remote="github" revision="lineage-23.2" />
              <project path="vendor/xiaomi/sm8450-common" name="LF52406/proprietary_vendor_xiaomi_sm8450-common" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450" name="LF52406/android_kernel_xiaomi_sm8450" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450-modules" name="LineageOS/android_kernel_xiaomi_sm8450-modules" remote="github" revision="lineage-23.2" />
              <project path="kernel/xiaomi/sm8450-devicetrees" name="LineageOS/android_kernel_xiaomi_sm8450-devicetrees" remote="github" revision="lineage-23.2" />
              <project path="hardware/xiaomi" name="LineageOS/android_hardware_xiaomi" remote="github" revision="lineage-23.2" />
          </manifest>
          EOF
          
          echo "✅ Local manifest created"
          
          # Синхронизация
          echo "🔄 Starting repo sync..."
          repo sync -c -j8 --force-sync --no-tags --no-clone-bundle

      - name: Run build
        run: |
          export PATH="$HOME/bin:$PATH"
          
          CLONE_NAME=$(crave clone list | grep "pixelos" | tail -1 | awk '{print $1}')
          if [ -z "$CLONE_NAME" ]; then
            echo "❌ No pixelos clone found"
            crave clone list || true
            exit 1
          fi
          
          cd "$(crave clone dir "$CLONE_NAME")"
          echo "🏗️ Starting build..."
          crave run --clean --no-patch -- "source build/envsetup.sh && lunch pixelos_mondrian-userdebug && mka bacon -j\$(nproc --all)"

      - name: Download result
        if: always()
        run: |
          export PATH="$HOME/bin:$PATH"
          
          CLONE_NAME=$(crave clone list | grep "pixelos" | tail -1 | awk '{print $1}')
          if [ -n "$CLONE_NAME" ]; then
            cd "$(crave clone dir "$CLONE_NAME")"
            mkdir -p $HOME/artifacts
            cd $HOME/artifacts
            crave pull out/target/product/mondrian/*.zip . || echo "No zip files found"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian-${{ github.run_number }}
          path: $HOME/artifacts/*.zip
          if-no-files-found: ignore
