name: Build PixelOS Android 16 (mondrian)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Clean workspace
        run: |
          sudo rm -rf ~/android
          mkdir -p ~/android
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev \
          libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python3

      - name: Setup git
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "builder"
          git lfs install

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo 'export PATH=~/bin:$PATH' >> ~/.bashrc

      - name: Init PixelOS source
        run: |
          export PATH=~/bin:$PATH
          cd ~/android
          repo init -u https://github.com/PixelOS-AOSP/android_manifest.git -b sixteen-qpr2 --git-lfs

      - name: Sync source
        run: |
          export PATH=~/bin:$PATH
          cd ~/android
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

      - name: Clone device trees
        run: |
          cd ~/android
          git clone https://github.com/LineageOS/android_device_xiaomi_mondrian.git -b lineage-23.2 device/xiaomi/mondrian
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450.git -b lineage-23.2 kernel/xiaomi/sm8450
          git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8450-modules.git -b lineage-23.2 kernel/xiaomi/sm8450-modules
          git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_mondrian.git -b lineage-23.2 vendor/xiaomi/mondrian
          git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sm8450-common.git -b lineage-23.2 vendor/xiaomi/sm8450-common
          git clone https://github.com/LineageOS/android_hardware_xiaomi.git -b lineage-23.2 hardware/xiaomi

      - name: Adapt device tree for PixelOS
        run: |
          cd ~/android/device/xiaomi/mondrian
          mv lineage_mondrian.mk pixelos_mondrian.mk
          sed -i 's/lineage/pixelos/g' pixelos_mondrian.mk
          sed -i 's/lineage_mondrian/pixelos_mondrian/g' AndroidProducts.mk
          echo "COMMON_LUNCH_CHOICES := pixelos_mondrian-userdebug" >> AndroidProducts.mk

      - name: Setup ccache
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 50G

      - name: Build ROM
        run: |
          export PATH=~/bin:$PATH
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export NINJA_ARGS="-j2"

          cd ~/android
          source build/envsetup.sh
          lunch pixelos_mondrian-userdebug
          mka bacon -j2

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-mondrian
          path: ~/android/out/target/product/mondrian/*.zip
